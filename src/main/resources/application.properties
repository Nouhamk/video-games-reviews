spring.application.name=avis
spring.datasource.url=jdbc:h2:mem:avisdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
security.jwt.secret=change-me-super-secret-key-change-me-2026
security.jwt.expiration-hours=24
