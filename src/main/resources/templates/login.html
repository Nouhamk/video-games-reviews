<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Connexion — Avis Jeux Vidéo</title>
    <link rel="stylesheet" th:href="@{/css/app.css}"/>
    <style>
        body { background: #0f0f1a; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .login-card { background: #1a1a2e; border: 1px solid #2d2d5b; border-radius: 12px; padding: 2.5rem 3rem; width: 100%; max-width: 420px; box-shadow: 0 8px 32px rgba(0,0,0,.4); }
        .login-card h1 { color: #e94560; text-align: center; margin-bottom: .5rem; font-size: 1.8rem; }
        .login-card p.subtitle { color: #888; text-align: center; margin-bottom: 2rem; font-size: .9rem; }
        .form-group { margin-bottom: 1.2rem; }
        .form-group label { display: block; color: #ccc; margin-bottom: .4rem; font-size: .9rem; }
        .form-group input { width: 100%; padding: .75rem 1rem; background: #0f0f1a; border: 1px solid #2d2d5b; border-radius: 8px; color: #fff; font-size: 1rem; box-sizing: border-box; }
        .form-group input:focus { outline: none; border-color: #e94560; }
        .btn-login { width: 100%; padding: .85rem; background: #e94560; color: #fff; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; margin-top: .5rem; transition: background .2s; }
        .btn-login:hover { background: #c73652; }
        .alert-error { background: rgba(233,69,96,.15); border: 1px solid #e94560; color: #e94560; border-radius: 8px; padding: .75rem 1rem; margin-bottom: 1.2rem; text-align: center; font-size: .9rem; }
        .hint { color: #555; font-size: .78rem; margin-top: 1.5rem; text-align: center; }
        .link-register { color: #888; font-size: .85rem; margin-top: 1rem; text-align: center; }
        .link-register a { color: #e94560; text-decoration: none; }
        .link-register a:hover { text-decoration: underline; }
    </style>
</head>
<body>
<div class="login-card">
    <h1>🎮 GameReviews</h1>
    <p class="subtitle">Connectez-vous à votre espace</p>

    <div th:if="${erreur}" class="alert-error" th:text="${erreur}"></div>

    <form th:action="@{/connexion}" method="post">
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="votre@email.com" required autofocus/>
        </div>
        <div class="form-group">
            <label for="motDePasse">Mot de passe</label>
            <input type="password" id="motDePasse" name="motDePasse" placeholder="••••••••" required/>
        </div>
        <button type="submit" class="btn-login">Se connecter</button>
    </form>

    <p class="link-register">
        Pas encore de compte ? <a th:href="@{/inscription}">S'inscrire</a>
    </p>

    <p class="hint">
        Compte de test joueur : <strong>nouhaila@example.com</strong> / <strong>password</strong><br/>
        Compte de test modérateur : <strong>ilias@example.com</strong> / <strong>password</strong>
    </p>
</div>
</body>
</html>
