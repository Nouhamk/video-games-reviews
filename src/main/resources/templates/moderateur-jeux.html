<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout-moderateur :: layout('Gestion des jeux', ~{::main})}">
<body><main>
<section class="section">
  <div class="container">

    <!-- Formulaire ajout jeu -->
    <div class="avis-form-box" style="margin-bottom:2.5rem">
      <div class="form-title">Ajouter un jeu</div>
      <form th:action="@{/moderateur/jeux/ajouter}" method="post" th:object="${jeuForm}">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem">
          <div class="form-group">
            <label class="form-label">Nom du jeu *</label>
            <input class="form-control" type="text" th:field="*{nom}" placeholder="Elden Ring"/>
          </div>
          <div class="form-group">
            <label class="form-label">Prix (€) *</label>
            <input class="form-control" type="number" th:field="*{prix}" min="0" step="0.01" placeholder="59.99"/>
          </div>
          <div class="form-group">
            <label class="form-label">Date de sortie *</label>
            <input class="form-control" type="date" th:field="*{dateSortie}"/>
          </div>
          <div class="form-group">
            <label class="form-label">Image (fichier)</label>
            <input class="form-control" type="text" th:field="*{image}" placeholder="elden_ring.jpg"/>
          </div>
          <div class="form-group" style="grid-column:1/-1">
            <label class="form-label">Description *</label>
            <textarea class="form-control" th:field="*{description}" rows="3" placeholder="Description du jeu..."></textarea>
          </div>
          <div class="form-group">
            <label class="form-label">Genre *</label>
            <select class="form-control" th:field="*{genreId}">
              <option value="">— Choisir —</option>
              <option th:each="g : ${genres}" th:value="${g.id}" th:text="${g.nom}">Genre</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Éditeur *</label>
            <select class="form-control" th:field="*{editeurId}">
              <option value="">— Choisir —</option>
              <option th:each="e : ${editeurs}" th:value="${e.id}" th:text="${e.nom}">Éditeur</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Classification *</label>
            <select class="form-control" th:field="*{classificationId}">
              <option value="">— Choisir —</option>
              <option th:each="c : ${classifications}" th:value="${c.id}" th:text="${c.nom}">PEGI</option>
            </select>
          </div>
        </div>
        <button type="submit" class="btn-full" style="margin-top:.5rem">Ajouter le jeu →</button>
      </form>
    </div>

    <!-- Liste des jeux -->
    <div class="mod-section">
      <div class="mod-section__title">Jeux existants (<span th:text="${jeux.size()}">0</span>)</div>
      <table class="mod-table">
        <thead>
          <tr><th>Nom</th><th>Genre</th><th>Éditeur</th><th>Classification</th><th>Prix</th><th>Sortie</th></tr>
        </thead>
        <tbody>
          <tr th:if="${jeux.isEmpty()}">
            <td colspan="6" style="text-align:center;padding:1.5rem;color:var(--text3)">Aucun jeu.</td>
          </tr>
          <tr th:each="j : ${jeux}">
            <td th:text="${j.nom}">Nom</td>
            <td th:text="${j.genre?.nom}">Genre</td>
            <td th:text="${j.editeur?.nom}">Éditeur</td>
            <td th:text="${j.classification?.nom}">PEGI</td>
            <td th:text="${j.prix} + ' €'">Prix</td>
            <td th:text="${j.dateSortie}">Date</td>
          </tr>
        </tbody>
      </table>
    </div>

  </div>
</section>
</main></body></html>
